services:
  api:
    build: .
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://visual:visual@postgres:5432/visual_assistant?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: visual
      POSTGRES_PASSWORD: visual
      POSTGRES_DB: visual_assistant
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visual -d visual_assistant"]
      interval: 2s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
